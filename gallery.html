<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anom Artsy — Gallery</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <!-- NAVIGATION -->
    <nav class="nav">
        <div class="nav-left">
            <img src="assets/site/ao-logo-neon-square.png" alt="AO Logo" class="nav-logo">
            <span class="nav-title">Anom Artsy</span>
        </div>

        <div class="nav-right">
            <a href="index.html" class="nav-link">Home</a>
            <a href="gallery.html" class="nav-link active">Gallery</a>
            <a href="custom.html" class="nav-link">Custom Work</a>
            <a href="merch.html" class="nav-link">Merch</a>
            <a href="stories.html" class="nav-link">Stories</a>
            <a href="kids-corner.html" class="nav-link">Kids Corner</a>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero" style="background: url('ao-background-neon-cosmic-muse-03.png') center/cover no-repeat;">
        <div class="hero-content">
            <h1 class="hero-title">Gallery</h1>
            <p class="hero-subtitle">A curated world of neon, fantasy, identity, and expression.</p>
        </div>
    </header>

    <!-- GALLERY GRID -->
    <section class="featured">
        <h2 class="section-title">Art Collections</h2>

        <div class="featured-grid">

            <div class="featured-card">
                <img src="ao-card-profile-visuals.png" alt="Profile Visuals">
                <h3>Profile Visuals</h3>
            </div>

            <div class="featured-card">
                <img src="ao-card-enchanted-forest.png" alt="Enchanted Forest">
                <h3>Enchanted Forest</h3>
            </div>

            <div class="featured-card">
                <img src="ao-card-still-dangerous-full.png" alt="Still Dangerous">
                <h3>Still Dangerous</h3>
            </div>

            <div class="featured-card">
                <img src="ao-card-anom-crystal-splash-full.png" alt="Crystal Splash">
                <h3>Crystal Splash</h3>
            </div>

            <div class="featured-card">
                <img src="ao-card-winging-it-since-forever-full.png" alt="Winging It">
                <h3>Winging It</h3>
            </div>

            <div class="featured-card">
                <img src="ao-card-the-vip-rope.png" alt="VIP Rope">
                <h3>VIP Rope</h3>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 Anom Artsy — All Rights Reserved</p>
    </footer>

</body>
</html>
